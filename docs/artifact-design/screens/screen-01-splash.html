<title>01 — Splash · CSB Vocab Mockup</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 40px 24px; }
  .screen-page-head { max-width: 700px; margin: 0 auto 32px; }
  .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-soft); margin-bottom: 16px; text-decoration: none; }
  .back-link:hover { color: var(--accent); }
  .screen-stage { display: flex; justify-content: center; }
  .screen-nav { display: flex; justify-content: space-between; max-width: 300px; margin: 24px auto 0; font-size: 13px; }
  .screen-nav a { color: var(--navy-700); text-decoration: none; font-weight: 700; }
  :root[data-theme="dark"] .screen-nav a, body { }
  @media (prefers-color-scheme: dark) { .screen-nav a { color: var(--accent); } }
  :root[data-theme="dark"] .screen-nav a { color: var(--accent); }
  .screen-nav span.disabled { color: var(--text-soft); opacity: 0.4; }
</style>
</head>
<body>
  <div class="screen-page-head">
    <a class="back-link" href="../index.html">&larr; Tất cả màn hình</a>
    <div class="frame-label"><span class="frame-no">01</span><span class="frame-name">Splash</span></div>

  </div>
  <div class="screen-stage">
    <div class="phone"><div class="notch"></div>

          <div class="dots"><i class="on"></i><i></i><i></i></div>
          <div class="skip">Bỏ qua ➜</div>
        </div>
      </div>
    </div>
  </div>
  <div class="screen-nav">
    <span class="disabled">&larr; Đầu tiên</span>
    <a href="screen-02-tra-cuu.html">02 Tra cứu &rarr;</a>
